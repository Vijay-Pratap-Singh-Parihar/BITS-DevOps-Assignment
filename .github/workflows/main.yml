name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: aceest-gym

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest -v

      - name: Build Docker Image
        run: docker build -t aceest-gym-app .
